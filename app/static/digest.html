<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodScribe — Redaktion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7c6ff7">
<style>
  .chip { display:inline-block; padding:.3rem .7rem; border-radius:20px; font-size:.78rem;
    background:var(--bg-card2); border:1px solid var(--border); color:var(--text-muted);
    cursor:pointer; transition:var(--transition); user-select:none; }
  .chip:hover { border-color:var(--accent); color:var(--text); }
  .chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .chip .cnt { opacity:.6; font-size:.7rem; margin-left:.25rem; }
  .slider-row { display:flex; align-items:center; gap:1rem; }
  .slider-row input[type=range] { flex:1; accent-color:var(--accent); }
  .slider-val { min-width:120px; text-align:right; font-weight:600; font-size:.85rem; color:var(--accent); }
  .tabs { display:flex; gap:.25rem; margin-bottom:1.25rem; border-bottom:1px solid var(--border); }
  .tabs button { background:none; border:none; color:var(--text-muted); padding:.6rem 1rem;
    font-size:.9rem; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; }
  .tabs button.active { color:var(--accent); border-bottom-color:var(--accent); }
</style>
</head>
<body>
<div id="nav-mount"></div>

<div class="main-content">
  <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem">
    <h1 id="zeitung-title" style="font-size:1.4rem;display:flex;align-items:center;gap:.5rem"></h1>
  </div>

  <div class="tabs" id="zeitung-tabs"></div>

  <!-- TAB: Ausgaben -->
  <div id="view-issues">
    <div id="digest-list" class="episode-list">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- TAB: Diese Woche -->
  <div id="view-week" style="display:none">
    <div id="week-content"><div class="empty-state"><div class="spinner"></div></div></div>
  </div>

  <!-- TAB: Templates -->
  <div id="view-recipes" style="display:none">
    <p style="color:var(--text-muted);font-size:.85rem;margin-bottom:1rem">
      Gespeicherte Templates laufen auf Knopfdruck oder automatisch nach Zeitplan (mit Push aufs Handy).
    </p>
    <div id="recipe-list" class="episode-list"><div class="empty-state"><div class="spinner"></div></div></div>
  </div>

  <!-- New Issue Modal -->
  <div id="new-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeNewDigest()">
    <div class="modal" style="max-width:720px;width:100%;max-height:90vh;overflow-y:auto">
      <h2 class="modal-title" data-icon="pencil">Neue Ausgabe</h2>
      <div style="display:flex;flex-direction:column;gap:1.1rem">

        <div class="form-group">
          <label class="form-label">Ressort</label>
          <div id="fmt-seg" style="display:flex;flex-wrap:wrap;gap:.5rem"></div>
          <div id="ressort-hint" style="font-size:.78rem;color:var(--text-muted);margin-top:.4rem"></div>
        </div>

        <!-- Free article: prompt + AI/manual source toggle (artikel only) -->
        <div class="form-group" id="article-group" style="display:none">
          <label class="form-label">Anweisung / Prompt</label>
          <textarea id="article-prompt" placeholder="z.B. Schreibe eine Wochenzeitung über KI-Trends mit einem optimistischen Tonfall und konkreten Beispielen." style="min-height:80px"></textarea>
          <div class="segmented" id="sel-seg" style="margin-top:.6rem">
            <button type="button" data-sel="ai" class="active" onclick="setSelMode('ai')">KI wählt Folgen</button>
            <button type="button" data-sel="manual" onclick="setSelMode('manual')">Folgen manuell wählen</button>
          </div>
          <div style="font-size:.78rem;color:var(--text-muted);margin-top:.4rem" id="sel-hint">Die KI sucht passende Folgen aus deiner Bibliothek zum Prompt.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Titel <span style="color:var(--text-muted);font-weight:400">(leer = automatisch)</span></label>
          <div style="display:flex;gap:.375rem">
            <input type="text" id="digest-title" placeholder="z.B. KI-Woche: Copilot & Prompting" style="flex:1">
            <button class="btn btn-ghost btn-icon btn-sm" id="auto-title-btn" onclick="autoTitle()" title="Titel automatisch generieren" data-icon="sparkles" data-icon-size="16"></button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Modell</label>
          <select id="model-sel" style="width:auto">
            <option value="">Standard (globale Einstellung)</option>
            <option value="pro">Pro (beste Qualität)</option>
            <option value="flash">Flash (schnell)</option>
            <option value="lite">Lite (günstig)</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Zeitraum</label>
          <div class="segmented" id="tf-seg" style="flex-wrap:wrap">
            <button data-tf="1" onclick="setTimeframe('1')">Heute</button>
            <button data-tf="2" onclick="setTimeframe('2')">2 Tage</button>
            <button data-tf="3" onclick="setTimeframe('3')">3 Tage</button>
            <button data-tf="7" class="active" onclick="setTimeframe('7')">7 Tage</button>
            <button data-tf="14" onclick="setTimeframe('14')">14 Tage</button>
            <button data-tf="30" onclick="setTimeframe('30')">30 Tage</button>
            <button data-tf="all" onclick="setTimeframe('all')">Alles</button>
            <button data-tf="daterange" onclick="setTimeframe('daterange')">Datum-Bereich</button>
            <button data-tf="manual" onclick="setTimeframe('manual')">Einzelne Folgen</button>
          </div>
          <!-- Date range picker (shown when daterange selected) -->
          <div id="daterange-picker" style="display:none;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;align-items:center">
            <label style="font-size:.85rem;color:var(--text-muted)">Von:</label>
            <input type="date" id="date-from" style="width:auto;min-width:0" oninput="updateCount()">
            <label style="font-size:.85rem;color:var(--text-muted)">Bis:</label>
            <input type="date" id="date-to" style="width:auto;min-width:0" oninput="updateCount()">
          </div>
        </div>

        <!-- Tag chips -->
        <div class="form-group" id="tag-group">
          <label class="form-label">Themen / Tags <span style="color:var(--text-muted);font-weight:400">(optional — leer = alle)</span></label>
          <div id="tag-chips" style="display:flex;flex-wrap:wrap;gap:.4rem;max-height:120px;overflow-y:auto">
            <span style="color:var(--text-muted);font-size:.8rem">Lade Tags…</span>
          </div>
          <label style="display:flex;align-items:center;gap:.4rem;margin-top:.5rem;font-size:.8rem;color:var(--text-muted);cursor:pointer">
            <input type="checkbox" id="match-all" style="width:auto" onchange="updateCount()"> alle gewählten Tags müssen zutreffen (sonst: mindestens einer)
          </label>
        </div>

        <!-- Podcast filter -->
        <div class="form-group" id="pod-group">
          <label class="form-label">Podcasts <span style="color:var(--text-muted);font-weight:400">(optional — leer = alle)</span></label>
          <div id="pod-chips" style="display:flex;flex-wrap:wrap;gap:.4rem;max-height:110px;overflow-y:auto"></div>
        </div>

        <!-- Manual episode picker -->
        <div id="episode-picker" style="display:none">
          <label class="form-label" style="margin-bottom:.5rem">Folgen auswählen</label>
          <input type="text" id="picker-search" placeholder="Folge suchen…" style="width:100%;margin-bottom:.5rem" oninput="filterPicker()">
          <div id="picker-list" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm)"></div>
        </div>

        <!-- Sliders (magazin/newsletter only) -->
        <div id="slider-group" style="display:none">
          <div class="form-group">
            <label class="form-label">Länge</label>
            <div class="slider-row">
              <input type="range" id="len-slider" min="1" max="5" value="3" oninput="updateSliderLabels()">
              <span class="slider-val" id="len-val">Standard</span>
            </div>
          </div>
          <div class="form-group" style="margin-top:.75rem">
            <label class="form-label">Stil</label>
            <div class="slider-row">
              <input type="range" id="style-slider" min="1" max="5" value="3" oninput="updateSliderLabels()">
              <span class="slider-val" id="style-val">Journalistisch</span>
            </div>
          </div>
        </div>

        <!-- Focus / recommendation — the editorial lever, always visible -->
        <div class="form-group" id="focus-group">
          <label class="form-label">Redaktioneller Fokus <span style="color:var(--text-muted);font-weight:400">(optional — was soll hervorgehoben werden?)</span></label>
          <textarea id="focus-input" placeholder="z.B. Die Folge über Prompt Engineering ist besonders spannend, das soll hervorgehoben werden." style="min-height:60px"></textarea>
        </div>

        <!-- Custom style prompt -->
        <div class="form-group" id="custom-style-group" style="display:none">
          <label class="form-label">Eigener Stil-Prompt <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
          <textarea id="custom-style-input" placeholder="z.B. Schreibe prägnant und verwende viele Zwischenüberschriften. Verzichte auf Einleitung." style="min-height:60px"></textarea>
        </div>

        <!-- Live preview: what goes in & what comes out -->
        <div id="preview-panel" style="background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1rem">
          <div style="font-size:.85rem;color:var(--accent);font-weight:600" id="count-line">…</div>
          <div id="estimate-line" style="font-size:.78rem;color:var(--text-muted);margin-top:.25rem"></div>
          <div id="preview-eps" style="margin-top:.5rem;display:flex;flex-direction:column;gap:.25rem"></div>
        </div>
      </div>

      <div class="modal-actions" style="flex-wrap:wrap;gap:.5rem">
        <button class="btn btn-secondary" onclick="closeNewDigest()">Abbrechen</button>
        <button class="btn btn-ghost" onclick="saveAsRecipe()" data-icon="save" data-icon-size="16">Als Template speichern</button>
        <button class="btn btn-primary" id="create-btn" onclick="createDigest()" data-icon="sparkles" data-icon-size="16">Generieren</button>
      </div>
    </div>
  </div>
</div>

<button class="fab" title="Neue Ausgabe" data-owner-only data-icon="plus" data-icon-size="26" onclick="openNewDigest()"></button>
<footer class="app-footer"><strong>PodScribe</strong> · © 2026 Sven Kompe · <a href="/about">Features & Info</a> · <a href="/terms">Nutzungsbedingungen</a></footer>
<div id="toast-container"></div>
<script src="/static/icons.js"></script>
<script src="/static/app.js"></script>
<script>
document.getElementById('nav-mount').innerHTML = renderNav('/digests');
initGlobalSearch();
initReadProgress();

// ── State ─────────────────────────────────────────────────────────────────
let LEN_LABELS = {1:'Kompakt',2:'Knapp',3:'Standard',4:'Ausführlich',5:'Magazin'};
let STYLE_LABELS = {1:'Technisch',2:'Analytisch',3:'Journalistisch',4:'Erzählend',5:'Leicht verständlich'};
let LEN_WORDS = {1:700,2:1200,3:1800,4:2800,5:4000};
let allEpisodes = [], selectedIds = new Set();
let allTags = [], selTags = new Set(), selPods = new Set();
let timeframe = '7';
let countTimer = null;

// Three editorial Ressorts mapped onto the existing backend formats —
// the backend keeps all 5 formats, only the UI is simplified.
const RESSORTS = {
  ueberblick: { label:'Überblick', iconName:'calendar', format:'daily_briefing',
    sliders:false, len:3, style:3,
    hint:'Kompakter Nachrichtenüberblick: Folge für Folge die wichtigsten Erkenntnisse — in ~3 Minuten gelesen.' },
  magazin: { label:'Magazin', iconName:'newspaper', format:'magazin',
    sliders:true, len:3, style:3,
    hint:'Gut geschriebene Artikel mit Analyse, Kontext und Zitaten — zum Lesen und Teilen.' },
  dossier: { label:'Dossier', iconName:'radar', format:'magazin',
    sliders:true, len:5, style:2,
    hint:'Tiefgehender Themen-Deep-Dive über alle Quellen hinweg. Tipp: Thema über Tags wählen und den redaktionellen Fokus nutzen.' },
  artikel: { label:'Freier Artikel', iconName:'pencil', format:'artikel',
    sliders:true, len:3, style:3,
    hint:'Schreibe einen Artikel/eine Zeitung aus einer freien Anweisung. Die KI kann passende Folgen selbst wählen — oder du wählst sie manuell.' },
};
let ressort = 'ueberblick';
let selMode = 'ai';   // for the free-article ressort: ai | manual
const backendFormat = () => RESSORTS[ressort].format;

const FORMAT_ICONS = {
  daily_briefing: icon('calendar',{size:16}), magazin: icon('newspaper',{size:16}),
  newsletter: icon('file-text',{size:16}), summary_takeaways: icon('list',{size:16}),
  teams_post: icon('share-2',{size:16}), zeitung: icon('newspaper',{size:16}),
  artikel: icon('pencil',{size:16}),
};
const fmtIcon = (f) => FORMAT_ICONS[f] || icon('newspaper',{size:16});

// ── Header + tabs (built in JS so icons are consistent) ─────────────────────
document.getElementById('zeitung-title').innerHTML = `${icon('newspaper',{size:22})} Redaktion`;
document.getElementById('zeitung-tabs').innerHTML = `
  <button id="tab-issues" class="active" onclick="switchTab('issues')">${icon('newspaper',{size:16})} Ausgaben</button>
  <button id="tab-week" onclick="switchTab('week')">${icon('calendar',{size:16})} Diese Woche</button>
  <button id="tab-recipes" onclick="switchTab('recipes')">${icon('repeat',{size:16})} Templates</button>`;

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(t) {
  for (const x of ['issues','week','recipes']) {
    document.getElementById('view-'+x).style.display = x===t ? '' : 'none';
    document.getElementById('tab-'+x).classList.toggle('active', x===t);
  }
  if (t==='week') loadWeek();
  if (t==='recipes') loadRecipes();
}

function openDigestMenu(anchor, id) {
  openMenu(anchor, [
    { icon:'trash-2', label:'Löschen', danger:true, onClick: () => deleteDigest(id) },
  ]);
}

// ── Issues list ─────────────────────────────────────────────────────────────
async function loadDigests() {
  const list = document.getElementById('digest-list');
  try {
    const digests = await API.get('/api/digests');
    if (!digests.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">${icon('newspaper',{size:44})}</div><p>Noch keine Ausgaben.<br>Erstelle deine erste über den ＋-Button.</p></div>`;
      return;
    }
    list.innerHTML = digests.map(d => `
      <div class="episode-item" onclick="openDigest(${d.id})">
        <div>
          <div class="episode-title" style="display:flex;align-items:center;gap:.4rem">${fmtIcon(d.format)} ${escHtml(d.title)}</div>
          <div class="episode-meta">
            ${d.subtitle ? `<span>${escHtml(d.subtitle)}</span>` : ''}
            <span>${fmtDate(d.created_at)}</span>
            ${d.status==='generating' ? statusBadge('transcribing') : d.status==='error' ? statusBadge('error') : statusBadge('done')}
          </div>
        </div>
        <div class="episode-actions" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-icon btn-sm" data-owner-only title="Mehr" onclick="openDigestMenu(this, ${d.id})">${icon('more-vertical')}</button>
        </div>
      </div>`).join('');
    if (digests.some(d => d.status === 'generating')) setTimeout(loadDigests, 6000);
  } catch(e) {
    list.innerHTML = `<div class="empty-state" style="color:var(--error)">${escHtml(e.message)}</div>`;
  }
}

// Reading happens on the dedicated /digest/{id} page (digest-reader.html).
function openDigest(id) {
  location.href = `/digest/${id}`;
}

async function deleteDigest(id) {
  if (!confirm('Ausgabe löschen?')) return;
  try { await API.del(`/api/digests/${id}`); toast('Gelöscht','success'); loadDigests(); }
  catch(e) { toast(e.message,'error'); }
}

// ── New issue builder ─────────────────────────────────────────────────────
async function openNewDigest() {
  selectedIds.clear(); selTags.clear(); selPods.clear();
  timeframe = '7';
  document.getElementById('digest-title').value = '';
  document.getElementById('match-all').checked = false;
  document.getElementById('model-sel').value = '';
  document.getElementById('custom-style-input').value = '';
  document.getElementById('focus-input').value = '';
  document.getElementById('article-prompt').value = '';
  selMode = 'ai';
  document.querySelectorAll('#sel-seg button').forEach(b => b.classList.toggle('active', b.dataset.sel==='ai'));
  renderFormatButtons();
  setRessort('ueberblick');
  document.getElementById('new-modal').style.display = '';
  await Promise.all([loadTags(), loadPods(), loadPickerEpisodes()]);
  updateCount();
}
function closeNewDigest() { document.getElementById('new-modal').style.display = 'none'; }

function renderFormatButtons() {
  const seg = document.getElementById('fmt-seg');
  seg.innerHTML = Object.entries(RESSORTS).map(([key, r]) =>
    `<button class="btn btn-secondary btn-sm${ressort===key?' active':''}" data-fmt="${key}" onclick="setRessort('${key}')">${icon(r.iconName,{size:16})} ${r.label}</button>`
  ).join('');
}

function setRessort(key) {
  ressort = key;
  const r = RESSORTS[key];
  document.querySelectorAll('#fmt-seg button').forEach(b => b.classList.toggle('active', b.dataset.fmt===key));
  document.getElementById('ressort-hint').textContent = r.hint;
  document.getElementById('slider-group').style.display = r.sliders ? '' : 'none';
  document.getElementById('custom-style-group').style.display = r.sliders ? '' : 'none';
  document.getElementById('len-slider').value = r.len;
  document.getElementById('style-slider').value = r.style;
  document.getElementById('article-group').style.display = key === 'artikel' ? '' : 'none';
  setTimeframe(key === 'ueberblick' ? '1' : '7');
  applyArticleUi();
  updateSliderLabels();
}

function setSelMode(mode) {
  selMode = mode;
  document.querySelectorAll('#sel-seg button').forEach(b => b.classList.toggle('active', b.dataset.sel===mode));
  document.getElementById('sel-hint').textContent = mode === 'ai'
    ? 'Die KI sucht passende Folgen aus deiner Bibliothek zum Prompt.'
    : 'Wähle die Quell-Folgen unten selbst (Zeitraum, Tags oder Einzelauswahl).';
  applyArticleUi();
}

// In free-article + AI mode the sources are chosen by the AI, so the manual
// source selectors are hidden (podcasts stay as an optional constraint).
function applyArticleUi() {
  const aiPick = ressort === 'artikel' && selMode === 'ai';
  document.querySelector('#tf-seg').closest('.form-group').style.display = aiPick ? 'none' : '';
  document.getElementById('tag-group').style.display = aiPick ? 'none' : (timeframe==='manual'?'none':'');
  document.getElementById('episode-picker').style.display = (!aiPick && timeframe==='manual') ? '' : 'none';
}

function setTimeframe(tf) {
  timeframe = tf;
  document.querySelectorAll('#tf-seg button').forEach(b => b.classList.toggle('active', b.dataset.tf===tf));
  const manual = tf==='manual';
  const daterange = tf==='daterange';
  document.getElementById('episode-picker').style.display = manual ? '' : 'none';
  document.getElementById('daterange-picker').style.display = daterange ? 'flex' : 'none';
  document.getElementById('tag-group').style.display = manual ? 'none' : '';
  document.getElementById('pod-group').style.display = manual ? 'none' : '';
  updateCount();
}

function updateSliderLabels() {
  const len = document.getElementById('len-slider').value;
  const words = LEN_WORDS[len] || 1800;
  document.getElementById('len-val').textContent =
    `${LEN_LABELS[len]} (≈${words} Wörter · ~${Math.max(1, Math.round(words/200))} Min.)`;
  document.getElementById('style-val').textContent = STYLE_LABELS[document.getElementById('style-slider').value];
  updateEstimate();
}

function updateEstimate() {
  const el = document.getElementById('estimate-line');
  if (!el) return;
  const r = RESSORTS[ressort];
  const words = r.sliders ? (LEN_WORDS[document.getElementById('len-slider').value] || 1800) : 700;
  el.textContent = `${r.label} · geschätzte Lesezeit ~${Math.max(1, Math.round(words/200))} Min. (≈${words} Wörter)`;
}

async function loadTags() {
  try {
    allTags = await API.get('/api/tags');
    const box = document.getElementById('tag-chips');
    if (!allTags.length) { box.innerHTML = '<span style="color:var(--text-muted);font-size:.8rem">Noch keine Tags. Transkribiere Folgen oder nutze „Tags nachtragen" in den Rezepten.</span>'; return; }
    box.innerHTML = allTags.map(t =>
      `<span class="chip" data-tag="${t.id}" onclick="toggleTag(${t.id}, this)">${escHtml(t.label)}<span class="cnt">${t.episode_count}</span></span>`).join('');
  } catch {}
}
function toggleTag(id, el) {
  if (selTags.has(id)) { selTags.delete(id); el.classList.remove('active'); }
  else { selTags.add(id); el.classList.add('active'); }
  updateCount();
}

async function loadPods() {
  try {
    const pods = await API.get('/api/podcasts');
    document.getElementById('pod-chips').innerHTML = pods.map(p =>
      `<span class="chip" data-pod="${p.id}" onclick="togglePod(${p.id}, this)">${escHtml(p.title)}</span>`).join('');
  } catch {}
}
function togglePod(id, el) {
  if (selPods.has(id)) { selPods.delete(id); el.classList.remove('active'); }
  else { selPods.add(id); el.classList.add('active'); }
  updateCount();
}

function currentRecipe() {
  const recipe = {
    podcast_ids: [...selPods],
    tag_ids: [...selTags],
    match: document.getElementById('match-all').checked ? 'all' : 'any',
  };
  if (timeframe === 'daterange') {
    recipe.date_from = document.getElementById('date-from').value || null;
    recipe.date_to = document.getElementById('date-to').value || null;
    recipe.date_window_days = null;
  } else if (timeframe === 'all' || timeframe === 'manual') {
    recipe.date_window_days = null;
  } else {
    recipe.date_window_days = parseInt(timeframe);
  }
  return recipe;
}

function renderPreviewEps(eps) {
  const box = document.getElementById('preview-eps');
  if (!box) return;
  if (!eps || !eps.length) { box.innerHTML = ''; return; }
  const shown = eps.slice(0, 8);
  box.innerHTML = shown.map(e =>
    `<div style="font-size:.8rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
       ${icon('play',{size:11})} ${escHtml(e.title)}
       <span style="color:var(--text-muted)">· ${escHtml(e.podcast_title||'')}</span>
     </div>`).join('')
    + (eps.length > shown.length
        ? `<div style="font-size:.75rem;color:var(--text-muted)">… und ${eps.length - shown.length} weitere</div>` : '');
}

function updateCount() {
  const line = document.getElementById('count-line');
  updateEstimate();
  if (timeframe === 'manual') {
    line.textContent = `${selectedIds.size} Folge(n) ausgewählt`;
    renderPreviewEps(allEpisodes.filter(e => selectedIds.has(e.id))
      .map(e => ({ title:e.title, podcast_title:e._pt })));
    return;
  }
  line.textContent = 'Zähle passende Folgen…';
  clearTimeout(countTimer);
  countTimer = setTimeout(async () => {
    try {
      const r = await API.post('/api/issues/select', currentRecipe());
      line.textContent = `${r.count} Folge(n) treffen zu`;
      renderPreviewEps(r.episodes);
    } catch { line.textContent = ''; renderPreviewEps([]); }
  }, 350);
}

// manual picker
async function loadPickerEpisodes() {
  try {
    const pods = await API.get('/api/podcasts');
    allEpisodes = [];
    for (const p of pods) {
      const eps = await API.get(`/api/podcasts/${p.id}/episodes?status=done&limit=50`);
      eps.forEach(e => { e._pt = p.title; });
      allEpisodes.push(...eps);
    }
    allEpisodes.sort((a, b) => (b.pub_date || '').localeCompare(a.pub_date || ''));
    renderPickerList(allEpisodes);
  } catch {}
}
function renderPickerList(eps) {
  const list = document.getElementById('picker-list');
  if (!eps.length) { list.innerHTML = '<div style="padding:1rem;color:var(--text-muted);font-size:.85rem">Keine fertigen Transkripte</div>'; return; }
  list.innerHTML = eps.map(e => `
    <label style="display:flex;align-items:center;gap:.6rem;padding:.5rem .75rem;border-bottom:1px solid var(--border);cursor:pointer;font-size:.85rem">
      <input type="checkbox" style="width:auto" ${selectedIds.has(e.id)?'checked':''} onchange="toggleEp(${e.id},this.checked)">
      <div style="flex:1;overflow:hidden"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(e.title)}</div>
      <div style="color:var(--text-muted);font-size:.75rem">${escHtml(e._pt)} · ${fmtDate(e.pub_date)}</div></div>
    </label>`).join('');
}
function toggleEp(id, c) { c ? selectedIds.add(id) : selectedIds.delete(id); updateCount(); }
function filterPicker() {
  const q = document.getElementById('picker-search').value.toLowerCase();
  renderPickerList(allEpisodes.filter(e => !q || e.title.toLowerCase().includes(q) || e._pt.toLowerCase().includes(q)));
}

async function autoTitle() {
  const btn = document.getElementById('auto-title-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '…'; }
  try {
    const payload = { title: '', format: backendFormat(), episode_ids: timeframe==='manual' ? [...selectedIds] : [],
                      recipe: timeframe!=='manual' ? currentRecipe() : undefined };
    const r = await API.post('/api/issues/title', payload);
    document.getElementById('digest-title').value = r.title || '';
  } catch(e) { toast(e.message, 'error'); }
  finally { if (btn) { btn.disabled = false; btn.innerHTML = icon('sparkles',{size:16}); } }
}

async function createDigest() {
  const title = document.getElementById('digest-title').value.trim();
  const length = parseInt(document.getElementById('len-slider').value);
  const style = parseInt(document.getElementById('style-slider').value);
  const model = document.getElementById('model-sel').value;
  const custom_style = document.getElementById('custom-style-input').value.trim();
  const focus = document.getElementById('focus-input').value.trim();
  const payload = { title, format: backendFormat(), length, style, model, custom_style, focus };

  const isArticle = ressort === 'artikel';
  if (isArticle) {
    payload.prompt = document.getElementById('article-prompt').value.trim();
    payload.selection_mode = selMode;
    if (!payload.prompt) return toast('Bitte eine Anweisung / einen Prompt eingeben', 'error');
  }

  if (isArticle && selMode === 'ai') {
    // AI picks the episodes from the prompt; pass podcasts as optional constraint.
    payload.recipe = { podcast_ids: [...selPods], tag_ids: [], match: 'any', date_window_days: null };
  } else if (timeframe === 'manual') {
    if (!selectedIds.size && !(isArticle && payload.prompt)) return toast('Bitte mindestens eine Folge wählen', 'error');
    payload.episode_ids = [...selectedIds];
  } else {
    payload.recipe = currentRecipe();
  }
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.innerHTML = icon('refresh-cw',{size:16}) + ' Generiere…';
  try {
    const r = await API.post('/api/digests', payload);
    toast('Ausgabe wird generiert…', 'info');
    closeNewDigest(); switchTab('issues'); await loadDigests();
    setTimeout(() => openDigest(r.id), 2000);
  } catch(e) { toast(e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = icon('sparkles',{size:16}) + ' Generieren'; }
}

async function saveAsRecipe() {
  const name = prompt('Name des Templates (z.B. „Copilot-Tipps wöchentlich"):',
    document.getElementById('digest-title').value || '');
  if (!name) return;
  const rec = currentRecipe();
  try {
    await API.post('/api/recipes', {
      name, format: backendFormat(),
      date_window_days: rec.date_window_days, podcast_ids: rec.podcast_ids,
      tag_ids: rec.tag_ids, match: rec.match,
      length: parseInt(document.getElementById('len-slider').value),
      style: parseInt(document.getElementById('style-slider').value),
      model: document.getElementById('model-sel').value,
      custom_style: document.getElementById('custom-style-input').value.trim(),
      focus: document.getElementById('focus-input').value.trim(),
    });
    toast('💾 Template gespeichert', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── Weekly overview ─────────────────────────────────────────────────────────
async function loadWeek() {
  const box = document.getElementById('week-content');
  box.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
  try {
    const w = await API.get('/api/overview/week?days=7');
    if (!w.episode_count) { box.innerHTML = `<div class="empty-state"><div class="icon">${icon('calendar',{size:44})}</div><p>Diese Woche noch keine fertigen Folgen.</p></div>`; return; }
    let html = '';
    if (w.top_tags.length) {
      html += `<div style="margin-bottom:1.25rem"><div class="form-label" style="margin-bottom:.5rem">Top-Themen der Woche (klicken → Newsletter)</div>
        <div style="display:flex;flex-wrap:wrap;gap:.4rem">${w.top_tags.map(t =>
          `<span class="chip" onclick="newsletterFromTag('${escHtml(t.label).replace(/'/g,"\\'")}')">${escHtml(t.label)}<span class="cnt">${t.count}</span></span>`).join('')}</div></div>`;
    }
    for (const grp of w.by_podcast) {
      html += `<div class="section-title" style="margin-top:1rem">${escHtml(grp.podcast_title)}</div>`;
      html += grp.episodes.map(e => `
        <div class="episode-item" onclick="location.href='/episode/${e.id}'">
          <div>
            <div class="episode-title">${escHtml(e.title)}</div>
            <div style="font-size:.8rem;color:var(--text-muted);margin:.25rem 0">${escHtml((e.summary||'').slice(0,180))}${(e.summary||'').length>180?'…':''}</div>
            <div style="display:flex;flex-wrap:wrap;gap:.3rem">${(e.tags||[]).map(t=>`<span class="chip" style="cursor:default;padding:.15rem .5rem;font-size:.7rem">${escHtml(t)}</span>`).join('')}</div>
          </div>
        </div>`).join('');
    }
    box.innerHTML = html;
  } catch(e) { box.innerHTML = `<div class="empty-state" style="color:var(--error)">${escHtml(e.message)}</div>`; }
}

async function newsletterFromTag(label) {
  await openNewDigest();
  setRessort('magazin');
  document.getElementById('len-slider').value = 2;  // knapper Wochenrückblick
  updateSliderLabels();
  setTimeframe('7');
  document.getElementById('digest-title').value = `${label} — diese Woche`;
  // select the matching tag chip
  const t = allTags.find(x => x.label === label);
  if (t) { selTags.add(t.id); const el = document.querySelector(`#tag-chips .chip[data-tag="${t.id}"]`); if (el) el.classList.add('active'); }
  updateCount();
}

// ── Recipes ──────────────────────────────────────────────────────────────────
const DOW = ['Mo','Di','Mi','Do','Fr','Sa','So'];
async function loadRecipes() {
  const box = document.getElementById('recipe-list');
  box.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
  try {
    const recs = await API.get('/api/recipes');
    let head = `<div style="margin-bottom:1rem"><button class="btn btn-secondary btn-sm" data-owner-only onclick="backfillTags()">${icon('tag',{size:16})} Tags für alle Folgen nachtragen</button></div>`;
    if (!recs.length) { box.innerHTML = head + `<div class="empty-state"><div class="icon">${icon('repeat',{size:44})}</div><p>Noch keine Templates. Erstelle eines über „Neue Ausgabe → Als Template speichern".</p></div>`; return; }
    box.innerHTML = head + recs.map(r => `
      <div class="episode-item">
        <div style="flex:1">
          <div class="episode-title" style="display:flex;align-items:center;gap:.4rem">${fmtIcon(r.format)} ${escHtml(r.name)}</div>
          <div class="episode-meta">
            <span>${r.date_window_days ? 'letzte '+r.date_window_days+' Tage' : 'alle'}</span>
            <span>Länge ${LEN_LABELS[r.length]}</span><span>Stil ${STYLE_LABELS[r.style]}</span>
            ${r.schedule_id && r.enabled ? `<span style="color:var(--success);display:inline-flex;align-items:center;gap:.25rem">${icon('clock',{size:13})} ${DOW[r.cron_dow]} ${String(r.cron_hour).padStart(2,'0')}:00</span>` : ''}
          </div>
          <div style="display:flex;gap:.4rem;align-items:center;margin-top:.5rem;flex-wrap:wrap">
            <select id="dow-${r.id}" style="padding:.2rem">${DOW.map((d,i)=>`<option value="${i}" ${r.cron_dow===i?'selected':''}>${d}</option>`).join('')}</select>
            <select id="hour-${r.id}" style="padding:.2rem">${Array.from({length:24},(_,h)=>`<option value="${h}" ${r.cron_hour===h?'selected':''}>${String(h).padStart(2,'0')}:00</option>`).join('')}</select>
            <button class="btn btn-ghost btn-sm" onclick="saveSchedule(${r.id}, ${r.enabled && r.schedule_id ? 0 : 1})">${r.enabled && r.schedule_id ? icon('pause',{size:15})+' Automatik aus' : icon('clock',{size:15})+' Automatik an'}</button>
          </div>
        </div>
        <div class="episode-actions" style="flex-direction:column;gap:.375rem" data-owner-only>
          <button class="btn btn-primary btn-sm" onclick="runRecipe(${r.id})">${icon('play',{size:15})} Jetzt</button>
          <button class="btn btn-ghost btn-icon btn-sm" title="Löschen" onclick="deleteRecipe(${r.id})">${icon('trash-2')}</button>
        </div>
      </div>`).join('');
  } catch(e) { box.innerHTML = `<div class="empty-state" style="color:var(--error)">${escHtml(e.message)}</div>`; }
}
async function runRecipe(id) {
  try { const r = await API.post(`/api/recipes/${id}/run`, {}); toast('▶ Ausgabe wird erzeugt…','info'); switchTab('issues'); await loadDigests(); setTimeout(()=>openDigest(r.id),2000); }
  catch(e){ toast(e.message,'error'); }
}
async function saveSchedule(id, enabled) {
  const dow = parseInt(document.getElementById('dow-'+id).value);
  const hour = parseInt(document.getElementById('hour-'+id).value);
  try { await API.post('/api/scheduled-issues', { recipe_id:id, cron_dow:dow, cron_hour:hour, enabled: !!enabled });
    toast(enabled?'⏰ Automatik aktiviert':'⏸ Automatik deaktiviert','success'); loadRecipes(); }
  catch(e){ toast(e.message,'error'); }
}
async function deleteRecipe(id) {
  if (!confirm('Template löschen?')) return;
  try { await API.del(`/api/recipes/${id}`); toast('Gelöscht','success'); loadRecipes(); } catch(e){ toast(e.message,'error'); }
}
async function backfillTags() {
  try { await API.post('/api/tags/backfill', {}); toast('🏷️ Tagging gestartet — läuft im Hintergrund. Du bekommst eine Push wenn fertig.','info'); }
  catch(e){ toast(e.message,'error'); }
}

// init
(async () => {
  try {
    const opt = await API.get('/api/issue-options');
    LEN_LABELS = Object.fromEntries(opt.length.map(x => [x.value, x.label]));
    STYLE_LABELS = Object.fromEntries(opt.style.map(x => [x.value, x.label]));
    if (opt.length[0]?.words) {
      LEN_WORDS = Object.fromEntries(opt.length.map(x => [x.value, x.words]));
    }
  } catch {}
  loadDigests();

  // CR 5: Auto-open modal when coming from podcast.html (?generate=podcast&id=X&title=Y)
  const params = new URLSearchParams(location.search);
  if (params.get('generate') === 'podcast' && params.get('id')) {
    await openNewDigest();
    const podId = parseInt(params.get('id'));
    const podTitle = params.get('title') || '';
    // Pre-select the podcast chip
    document.querySelectorAll('#pod-chips .chip').forEach(el => {
      if (parseInt(el.dataset.pod) === podId) { el.classList.add('active'); selPods.add(podId); }
    });
    document.getElementById('digest-title').value = `Podcast-Porträt: ${podTitle}`;
    setRessort('magazin');
    setTimeframe('all');
    document.getElementById('len-slider').value = 4;
    updateSliderLabels(); updateCount();
  }
})();
</script>
</body>
