<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodScribe — Podcast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7c6ff7">
</head>
<body>
<div id="nav-mount"></div>

<div class="main-content">

  <!-- Header -->
  <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem">
    <a href="/" class="btn btn-ghost btn-icon" title="Zurück" data-icon="chevron-left"></a>
    <span id="breadcrumb" style="color:var(--text-muted);font-size:.875rem">Bibliothek</span>
  </div>

  <div id="podcast-header" class="page-header">
    <div class="spinner"></div>
  </div>

  <!-- Actions -->
  <div class="action-bar" id="podcast-actions" style="display:none">
    <button class="btn btn-secondary btn-sm" data-icon="refresh-cw" data-icon-size="15" onclick="triggerCheck()">Auf neue Folgen prüfen</button>
    <button class="btn btn-primary btn-sm" data-icon="newspaper" data-icon-size="15" onclick="generateArticle()">Podcast-Artikel</button>
    <button class="btn btn-secondary btn-sm" data-icon="download" data-icon-size="15" onclick="bulkExport()">Alle Transkripte exportieren</button>
    <button class="btn btn-secondary btn-sm" data-icon="settings" data-icon-size="15" onclick="toggleSettings()">Einstellungen</button>
    <button class="btn btn-danger btn-sm" data-icon="trash-2" data-icon-size="15" onclick="deletePodcast()">Abonnement löschen</button>
  </div>

  <!-- Settings panel (collapsible) -->
  <div id="podcast-settings" class="card" style="display:none;margin-bottom:1.25rem">
    <h3 style="font-size:.95rem;font-weight:700;margin-bottom:.875rem;display:flex;align-items:center;gap:.4rem" data-icon="settings" data-icon-size="16">Feed-Einstellungen</h3>
    <div style="display:grid;gap:1rem;max-width:480px">
      <label style="display:flex;align-items:center;gap:.625rem;font-size:.875rem;cursor:pointer">
        <input type="checkbox" id="set-auto" style="width:auto" onchange="markDirty()">
        Auto-Transkription neuer Folgen
      </label>
      <label style="display:block;font-size:.875rem">
        <span style="display:block;margin-bottom:.25rem">Max. Folgen abrufen <span style="color:var(--text-muted)">(0 = alle)</span></span>
        <input type="number" id="set-maxep" min="0" style="width:100%" oninput="markDirty()">
      </label>
      <label style="display:block;font-size:.875rem">
        <span style="display:block;margin-bottom:.25rem">Aufbewahrung: max. Transkripte <span style="color:var(--text-muted)">(0 = alle behalten)</span></span>
        <input type="number" id="set-maxtr" min="0" style="width:100%" oninput="markDirty()">
        <span style="display:block;margin-top:.25rem;font-size:.75rem;color:var(--text-muted)">Ältere Transkripte werden automatisch gelöscht. Audio wird ohnehin nicht dauerhaft gespeichert.</span>
      </label>
      <label style="display:block;font-size:.875rem">
        <span style="display:block;margin-bottom:.25rem">Prüf-Intervall (Stunden)</span>
        <input type="number" id="set-interval" min="1" style="width:100%" oninput="markDirty()">
      </label>
      <label id="set-fulltext-wrap" style="display:none;align-items:center;gap:.625rem;font-size:.875rem;cursor:pointer">
        <input type="checkbox" id="set-fulltext" style="width:auto" onchange="markDirty()">
        <span data-icon="newspaper" data-icon-size="15">Volltext von der Artikelseite laden (Newsfeed)</span>
      </label>
      <div>
        <button class="btn btn-primary btn-sm" id="set-save" onclick="savePodcastSettings()" disabled>Speichern</button>
      </div>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div style="display:flex;gap:.375rem;margin-bottom:1rem;flex-wrap:wrap" id="filter-tabs">
    <button class="btn btn-primary btn-sm active-tab" data-status="" onclick="setFilter('')">Alle</button>
    <button class="btn btn-secondary btn-sm" data-status="done" data-icon="check" data-icon-size="15" onclick="setFilter('done')">Fertig</button>
    <button class="btn btn-secondary btn-sm" data-status="pending" data-icon="clock" data-icon-size="15" onclick="setFilter('pending')">Ausstehend</button>
    <button class="btn btn-secondary btn-sm" data-status="error" data-icon="alert-triangle" data-icon-size="15" onclick="setFilter('error')">Fehler</button>
  </div>

  <!-- Episodes -->
  <div id="episode-list" class="episode-list">
    <div class="empty-state"><div class="spinner"></div></div>
  </div>

  <div id="load-more" style="text-align:center;margin-top:1rem;display:none">
    <button class="btn btn-secondary" onclick="loadMore()">Mehr laden</button>
  </div>

</div>

<footer class="app-footer"><strong>PodScribe</strong> · © 2026 Sven Kompe · <a href="/about">Features & Info</a></footer>
<div id="toast-container"></div>
<script src="/static/icons.js"></script>
<script src="/static/app.js"></script>
<script>
document.getElementById('nav-mount').innerHTML = renderNav('/podcast');
initGlobalSearch();
initReadProgress();
setInterval(pollQueue, 8000);

const podcastId = pageId();
let currentFilter = '';
let currentPage = 1;
let podcastData = null;

async function loadPodcast() {
  try {
    podcastData = await API.get(`/api/podcasts/${podcastId}`);
    const h = document.getElementById('podcast-header');
    h.innerHTML = `
      <div class="page-header-art" style="padding:0;overflow:hidden">
        ${podcastData.feed_type==='newsletter'
          ? avatarFor(podcastData.title, {newsletter:true})
          : podcastData.artwork_url
            ? `<img src="${escHtml(podcastData.artwork_url)}" alt="${escHtml(podcastData.title)}" style="width:100%;height:100%;object-fit:cover" onerror="podcastImgFallback(this, ${JSON.stringify(escHtml(podcastData.title))})">`
            : avatarFor(podcastData.title)}
      </div>
      <div class="page-header-info">
        <h1>${escHtml(podcastData.title)}</h1>
        <p>${escHtml((podcastData.description||'').slice(0,200))}</p>
        <div style="display:flex;gap:.75rem;margin-top:.5rem;flex-wrap:wrap;align-items:center">
          ${podcastData.feed_type==='newsfeed' ? `<span class="badge" style="font-size:.7rem;display:inline-flex;align-items:center;gap:.25rem">${icon('newspaper',{size:13})} Newsfeed</span>` : ''}
          ${podcastData.feed_type==='newsletter' ? `<span class="badge" style="font-size:.7rem;display:inline-flex;align-items:center;gap:.25rem">${icon('mail',{size:13})} Newsletter</span>` : ''}
          ${podcastData.website_url ? `<a href="${escHtml(podcastData.website_url)}" target="_blank" style="font-size:.8rem;display:inline-flex;align-items:center;gap:.25rem">${icon('globe',{size:13})} Website</a>` : ''}
          ${podcastData.auto_transcribe ? `<span style="font-size:.8rem;color:var(--success);display:inline-flex;align-items:center;gap:.25rem">${icon('refresh-cw',{size:13})} Auto-Transkription an</span>` : ''}
          ${(podcastData.consecutive_fetch_errors||0) > 2
            ? `<span class="badge-warn" style="display:inline-flex;align-items:center;gap:.25rem" title="${escHtml(podcastData.last_fetch_error||'')}">${icon('alert-triangle',{size:13})} ${podcastData.consecutive_fetch_errors} Feed-Fehler</span>`
            : ''}
        </div>
      </div>`;
    document.title = `PodScribe — ${podcastData.title}`;
    document.getElementById('breadcrumb').textContent = podcastData.title;
    document.getElementById('podcast-actions').style.display = '';
  } catch(e) { toast(e.message,'error'); }
}

async function loadEpisodes(append=false) {
  if (!append) currentPage = 1;
  const list = document.getElementById('episode-list');
  if (!append) list.innerHTML = skeletonRows(6);
  try {
    const url = `/api/podcasts/${podcastId}/episodes?page=${currentPage}&limit=30${currentFilter?'&status='+currentFilter:''}`;
    const episodes = await API.get(url);
    if (!append) list.innerHTML = '';
    if (!episodes.length && !append) {
      list.innerHTML = `<div class="empty-state"><div class="icon">${icon('headphones',{size:44})}</div><p>Keine Folgen in dieser Kategorie</p></div>`;
      document.getElementById('load-more').style.display = 'none';
      return;
    }
    list.insertAdjacentHTML('beforeend', episodes.map(e => renderEpisode(e)).join(''));
    document.getElementById('load-more').style.display = episodes.length===30 ? '' : 'none';
  } catch(e) { list.innerHTML = `<div class="empty-state" style="color:var(--error)">${escHtml(e.message)}</div>`; }
}

function elapsedStr(startedAt, serverNow) {
  if (!startedAt || !serverNow) return '';
  // SQLite CURRENT_TIMESTAMP is in UTC without timezone marker — treat both as UTC
  const start = new Date(startedAt.replace(' ', 'T') + 'Z');
  const now = new Date(serverNow.replace(' ', 'T') + 'Z');
  const mins = Math.round((now - start) / 60000);
  if (mins < 1) return 'gerade gestartet';
  return `läuft seit ${mins} Min.`;
}

function renderEpisode(e) {
  const chapters = (() => { try { return JSON.parse(e.chapters_json||'[]'); } catch { return []; } })();
  const isActive = ['downloading','transcribing'].includes(e.status);
  const elapsed = isActive ? elapsedStr(e.processing_started_at, e.server_now) : '';
  // tags_csv: "label|id,label|id"
  const tags = (e.tags_csv||'').split(',').filter(Boolean)
    .map(t => { const [label,id]=t.split('|'); return `<a href="/tags/${id||''}" onclick="event.stopPropagation()" class="tag" style="font-size:.68rem">${escHtml(label||t)}</a>`; }).join('');
  const titleEsc = escHtml(e.title).replace(/'/g, "\\'");
  return `
    <div class="episode-item ${e.read_at?'read':'unread'}" onclick="location.href='/episode/${e.id}'">
      <div style="flex:1;min-width:0">
        <div class="episode-title">${escHtml(e.title)}</div>
        <div class="episode-meta">
          <span>${fmtDate(e.pub_date)}</span>
          ${e.duration_sec?`<span>${fmtDuration(e.duration_sec)}</span>`:''}
          ${statusBadge(e.status)}
          ${elapsed ? `<span class="elapsed-badge">${elapsed}</span>` : ''}
          ${e.word_count?`<span>${(e.word_count/1000).toFixed(1)}k Wörter</span>`:''}
        </div>
        ${e.status==='error'&&e.error_msg ? `<div class="error-detail">${escHtml(e.error_msg.slice(0,160))}</div>` : ''}
        ${e.summary?`<div class="episode-summary">${escHtml(e.summary)}</div>`:''}
        ${chapters.length?`<div style="margin-top:.375rem;font-size:.75rem;color:var(--text-muted)">${chapters.length} Kapitel</div>`:''}
        ${tags ? `<div class="episode-tags">${tags}</div>` : ''}
      </div>
      <div class="episode-actions" onclick="event.stopPropagation()">
        ${e.status==='pending'
          ? `<button class="btn btn-primary btn-icon btn-sm" title="Transkribieren" onclick="transcribeOne(${e.id},'${escHtml(e.audio_url)}', this)">${icon('sparkles',{size:16})}</button>`
          : ''}
        ${e.status==='error'
          ? `<button class="btn btn-primary btn-icon btn-sm" title="Erneut versuchen" onclick="retryEpisode(${e.id}, this)">${icon('refresh-cw',{size:16})}</button>`
          : ''}
        ${e.status==='done'
          ? `<button class="btn btn-ghost btn-icon btn-sm" title="Neu transkribieren" onclick="retranscribeEpisode(${e.id}, '${titleEsc}', this)">${icon('repeat',{size:16})}</button>`
          : ''}
        <button class="btn btn-ghost btn-icon btn-sm" data-on="${e.watchlist?'1':'0'}" title="${e.watchlist?'Von Leseliste':'Zur Leseliste'}" onclick="toggleWatch(${e.id}, this)">${icon(e.watchlist?'bookmark-check':'bookmark',{size:16})}</button>
        <button class="btn btn-ghost btn-icon btn-sm" title="Episode löschen" onclick="deleteEpisode(${e.id}, '${titleEsc}', this)">${icon('trash-2',{size:16})}</button>
      </div>
    </div>`;
}

function setFilter(status) {
  currentFilter = status;
  document.querySelectorAll('#filter-tabs button').forEach(b => {
    b.className = b.dataset.status === status ? 'btn btn-primary btn-sm active-tab' : 'btn btn-secondary btn-sm';
  });
  loadEpisodes();
}

function loadMore() { currentPage++; loadEpisodes(true); }

async function transcribeOne(id, url, btn) {
  btn.disabled = true; btn.innerHTML = '…';
  try {
    await API.post('/api/episodes/transcribe', { urls: [url] });
    toast('In Warteschlange', 'info');
    setTimeout(() => loadEpisodes(), 1500);
  } catch(e) { toast(e.message,'error'); btn.disabled=false; btn.innerHTML=icon('sparkles',{size:16}); }
}

async function toggleWatch(id, btn) {
  try {
    await API.patch(`/api/episodes/${id}/watchlist`);
    const on = btn.dataset.on === '1';
    btn.dataset.on = on ? '0' : '1';
    btn.innerHTML = icon(on ? 'bookmark' : 'bookmark-check', {size:16});
  } catch {}
}

function toggleSettings() {
  const panel = document.getElementById('podcast-settings');
  const show = panel.style.display === 'none';
  panel.style.display = show ? '' : 'none';
  document.body.classList.toggle('settings-open', show);
  if (show) populateSettings();
}

// Close bottom-sheet on outside tap (mobile)
document.addEventListener('click', e => {
  if (window.innerWidth <= 640 &&
      document.body.classList.contains('settings-open') &&
      !e.target.closest('#podcast-settings') &&
      !e.target.closest('button[onclick="toggleSettings()"]')) {
    toggleSettings();
  }
});

function populateSettings() {
  if (!podcastData) return;
  document.getElementById('set-auto').checked = !!podcastData.auto_transcribe;
  document.getElementById('set-maxep').value = podcastData.max_episodes ?? 0;
  document.getElementById('set-maxtr').value = podcastData.max_transcripts ?? 0;
  document.getElementById('set-interval').value = podcastData.check_interval_hours ?? 24;
  const ftWrap = document.getElementById('set-fulltext-wrap');
  if (podcastData.feed_type === 'newsfeed') {
    ftWrap.style.display = 'flex';
    document.getElementById('set-fulltext').checked = !!podcastData.full_text_extraction;
  } else {
    ftWrap.style.display = 'none';
  }
  document.getElementById('set-save').disabled = true;
}

function markDirty() {
  document.getElementById('set-save').disabled = false;
}

async function savePodcastSettings() {
  const payload = {
    auto_transcribe: document.getElementById('set-auto').checked,
    max_episodes: parseInt(document.getElementById('set-maxep').value) || 0,
    max_transcripts: parseInt(document.getElementById('set-maxtr').value) || 0,
    check_interval_hours: parseInt(document.getElementById('set-interval').value) || 1,
  };
  if (podcastData.feed_type === 'newsfeed') {
    payload.full_text_extraction = document.getElementById('set-fulltext').checked;
  }
  try {
    await API.patch(`/api/podcasts/${podcastId}`, payload);
    Object.assign(podcastData, payload);
    document.getElementById('set-save').disabled = true;
    toast('Einstellungen gespeichert', 'success');
    loadPodcast();
  } catch(e) { toast(e.message, 'error'); }
}

async function triggerCheck() {
  try {
    const r = await API.post(`/api/podcasts/${podcastId}/check`, {});
    toast(r.new > 0 ? `${r.new} neue Folge(n) gefunden` : 'Keine neuen Folgen', r.new > 0 ? 'success' : 'info');
    if (r.new > 0) loadEpisodes();
  } catch(e) { toast(e.message,'error'); }
}

async function bulkExport() {
  window.open(`/api/podcasts/${podcastId}/export`, '_blank');
}

function generateArticle() {
  // Navigate to digest page with pre-filled podcast filter
  location.href = `/digests?generate=podcast&id=${podcastId}&title=${encodeURIComponent(podcastData?.title||'')}`;
}

async function deletePodcast() {
  const ok = await confirmModal(
    'Abonnement löschen?',
    `"${podcastData?.title}" und alle zugehörigen Transkripte werden dauerhaft entfernt.`
  );
  if (!ok) return;
  try {
    await API.del(`/api/podcasts/${podcastId}`);
    toast('Gelöscht', 'success');
    setTimeout(() => location.href='/', 800);
  } catch(e) { toast(e.message,'error'); }
}

async function retryEpisode(id, btn) {
  btn.disabled = true;
  try {
    await API.post(`/api/episodes/${id}/retranscribe`, {});
    toast('Erneut in Warteschlange', 'info');
    setTimeout(() => loadEpisodes(), 1500);
  } catch(e) { toast(e.message, 'error'); btn.disabled = false; }
}

async function retranscribeEpisode(id, title, btn) {
  const ok = await confirmModal(
    'Neu transkribieren?',
    `"${title}" — vorhandenes Transkript, Zusammenfassung und Tags werden gelöscht und neu erstellt.`,
    'Neu transkribieren'
  );
  if (!ok) return;
  btn.disabled = true;
  try {
    await API.post(`/api/episodes/${id}/retranscribe`, {});
    toast('🔁 Erneut in Warteschlange', 'info');
    setTimeout(() => loadEpisodes(), 1500);
  } catch(e) { toast(e.message, 'error'); btn.disabled = false; }
}

async function deleteEpisode(id, title, btn) {
  const ok = await confirmModal('Episode löschen?', `"${title}" wird dauerhaft entfernt.`);
  if (!ok) return;
  btn.disabled = true;
  try {
    await API.del(`/api/episodes/${id}`);
    toast('Episode gelöscht', 'success');
    loadEpisodes();
  } catch(e) { toast(e.message, 'error'); btn.disabled = false; }
}

// Auto-refresh active jobs
let refreshTimer;
async function checkAndRefresh() {
  const list = document.getElementById('episode-list');
  const hasActive = list.innerHTML.includes('status-downloading') || list.innerHTML.includes('status-transcribing') || list.innerHTML.includes('status-queued');
  if (hasActive) loadEpisodes();
}

loadPodcast().then(() => loadEpisodes());
setInterval(checkAndRefresh, 6000);
</script>
</body>
</html>
