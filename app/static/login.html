<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodScribe — Anmelden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon.svg">
<meta name="theme-color" content="#7c6ff7">
</head>
<body>
<div class="main-content" style="max-width:420px;margin:10vh auto 0">
  <div class="card" style="padding:1.75rem">
    <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:.25rem">PodScribe</h1>
    <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.25rem">
      Bitte melde dich an, um fortzufahren.
    </p>
    <form id="login-form">
      <input type="text" id="username" placeholder="Name (für Freunde) — leer lassen als Eigentümer"
             autocomplete="username" style="width:100%;margin-bottom:.75rem">
      <input type="password" id="password" placeholder="Passwort" autocomplete="current-password"
             style="width:100%;margin-bottom:.75rem" autofocus required>
      <button class="btn btn-primary" type="submit" style="width:100%">Anmelden</button>
    </form>
    <div id="login-error" style="color:var(--error);font-size:.85rem;margin-top:.75rem;display:none"></div>
    <p style="color:var(--text-muted);font-size:.78rem;margin-top:1.25rem">
      Freunde melden sich mit ihrem <strong>Namen + Passwort</strong> an (Lesezugriff). Volle Kontrolle
      (Transkribieren, Einstellungen, Redaktion) hat nur der Eigentümer (Name leer lassen).
    </p>
    <p style="color:var(--text-muted);font-size:.75rem;margin-top:.75rem">
      <a href="/terms" style="color:var(--accent);text-decoration:none">Nutzungsbedingungen</a>
    </p>
  </div>
</div>
<div id="toast-container"></div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  const password = document.getElementById('password').value;
  const username = document.getElementById('username').value.trim();
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (res.ok) {
      location.href = '/';
    } else {
      const data = await res.json().catch(() => ({}));
      err.textContent = data.detail || 'Anmeldung fehlgeschlagen';
      err.style.display = 'block';
    }
  } catch (_) {
    err.textContent = 'Netzwerkfehler';
    err.style.display = 'block';
  }
});
</script>
</body>
</html>
