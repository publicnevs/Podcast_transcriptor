<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodScribe — Bibliothek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7c6ff7">
</head>
<body>
<div id="nav-mount"></div>

<div class="main-content">

  <!-- Add Podcast Panel (opens via ➕ Abonnieren in nav, or ?add=1) -->
  <div id="add-section" style="display:none;margin-bottom:1.5rem">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
        <h3 style="font-size:1rem;font-weight:700;display:flex;align-items:center;gap:.4rem" data-icon="plus" data-icon-size="18">Podcast oder Feed abonnieren</h3>
        <button class="btn btn-ghost btn-icon btn-sm" title="Schließen" data-icon="x" onclick="toggleAddPanel()"></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="form-group">
          <label class="form-label">RSS-Feed URL oder YouTube-Kanal-URL</label>
          <div class="input-row">
            <input type="url" id="rss-url" placeholder="https://feeds.example.com/podcast.xml">
            <button class="btn btn-primary" onclick="addPodcast()">Abonnieren</button>
          </div>
        </div>
        <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:.5rem;font-size:.875rem;cursor:pointer">
            <input type="checkbox" id="auto-transcribe" style="width:auto">
            Auto-Transkription neuer Folgen
          </label>
          <label style="display:flex;align-items:center;gap:.5rem;font-size:.875rem;cursor:pointer">
            <input type="checkbox" id="full-text" style="width:auto">
            Volltext von Seite laden (Newsfeed)
          </label>
          <div class="form-group" style="flex-direction:row;align-items:center;gap:.5rem">
            <label class="form-label" style="white-space:nowrap">Max. Einträge:</label>
            <input type="number" id="max-eps" value="0" min="0" style="width:70px">
            <span style="font-size:.8rem;color:var(--text-muted)">(0 = alle)</span>
          </div>
        </div>

        <details style="margin-top:.25rem">
          <summary style="color:var(--text-muted);font-size:.875rem" data-icon="download" data-icon-size="15">OPML-Import (alle Podcasts auf einmal)</summary>
          <div style="margin-top:.75rem;display:flex;gap:.5rem;align-items:center">
            <input type="file" id="opml-file" accept=".opml,.xml" style="flex:1">
            <button class="btn btn-secondary" onclick="importOpml()">Importieren</button>
          </div>
        </details>

        <details style="margin-top:.25rem">
          <summary style="color:var(--text-muted);font-size:.875rem" data-icon="headphones" data-icon-size="15">Einzelne URLs direkt transkribieren</summary>
          <div style="margin-top:.75rem;display:flex;flex-direction:column;gap:.5rem">
            <textarea id="direct-urls" placeholder="Eine URL pro Zeile&#10;https://example.com/episode.mp3&#10;https://youtube.com/watch?v=..." style="min-height:80px"></textarea>
            <button class="btn btn-secondary" style="align-self:flex-start" data-icon="sparkles" data-icon-size="16" onclick="directTranscribe()">Transkribieren</button>
          </div>
        </details>
      </div>
    </div>
  </div>

  <!-- Watchlist -->
  <div id="watchlist-section" style="display:none;margin-bottom:1.5rem">
    <div class="section-title" data-icon="bookmark" data-icon-size="16">Leseliste</div>
    <div id="watchlist-list" class="episode-list"></div>
  </div>

  <!-- Podcasts Grid -->
  <div class="section-title" data-icon="library" data-icon-size="16">Podcasts &amp; Feeds</div>
  <div id="podcast-grid" class="card-grid"></div>

</div>

<footer class="app-footer">
  <strong>PodScribe</strong> · © 2026 Sven Kompe ·
  <a href="/about">Features & Info</a>
</footer>

<div id="toast-container"></div>
<script src="/static/icons.js"></script>
<script src="/static/app.js"></script>
<script>
document.getElementById('nav-mount').innerHTML = renderNav('/');
initGlobalSearch();
initReadProgress();
setInterval(pollQueue, 8000);

let firstLoad = true;
async function loadPodcasts() {
  const grid = document.getElementById('podcast-grid');
  if (firstLoad) { grid.innerHTML = skeletonCards(6); }
  try {
    const podcasts = await API.get('/api/podcasts');
    firstLoad = false;
    if (!podcasts.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">${icon('headphones',{size:44})}</div><p>Noch keine Podcasts abonniert.<br>Füge deinen ersten Podcast oben hinzu.</p></div>`;
      return;
    }
    grid.classList.add('fade-in');
    grid.innerHTML = podcasts.map(p => `
      <div class="podcast-card" onclick="location.href='/podcast/${p.id}'">
        ${p.artwork_url
          ? `<img src="${escHtml(p.artwork_url)}" alt="" loading="lazy" onerror="podcastImgFallback(this)">`
          : `<div class="podcast-card-placeholder">${icon('headphones',{size:40})}</div>`}
        <div class="podcast-card-body">
          <div class="podcast-card-title">${escHtml(p.title)}</div>
          <div class="podcast-card-meta">
            ${p.unread_count > 0 ? `<span class="unread-badge">${p.unread_count} neu</span>` : ''}
            <span>${p.done_count} ${p.feed_type==='newsletter'?'Ausgaben':(p.feed_type==='newsfeed'?'Artikel':'Transkripte')}</span>
            ${p.auto_transcribe && p.feed_type!=='newsfeed' && p.feed_type!=='newsletter' ? `<span title="Auto-Transkription aktiv" style="display:inline-flex">${icon('refresh-cw',{size:14})}</span>` : ''}
            ${p.feed_type==='newsfeed' ? `<span title="Newsfeed" style="display:inline-flex">${icon('newspaper',{size:14})}</span>` : ''}
            ${p.feed_type==='newsletter' ? `<span title="Newsletter" style="display:inline-flex">${icon('mail',{size:14})}</span>` : ''}
          </div>
        </div>
      </div>`).join('');
  } catch(e) {
    firstLoad = false;
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;color:var(--error)">${escHtml(e.message)}</div>`;
  }
}


function toggleAddPanel() {
  const panel = document.getElementById('add-section');
  const show = panel.style.display === 'none';
  panel.style.display = show ? '' : 'none';
  if (show) {
    setTimeout(() => document.getElementById('rss-url')?.focus(), 50);
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

async function loadWatchlist() {
  try {
    const items = await API.get('/api/watchlist');
    const section = document.getElementById('watchlist-section');
    const list = document.getElementById('watchlist-list');
    if (!items.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    list.innerHTML = items.map(e => `
      <div class="episode-item ${e.read_at?'read':'unread'}" onclick="location.href='/episode/${e.id}'">
        <div>
          <div class="episode-title">${escHtml(e.title)}</div>
          <div class="episode-meta">
            <span>${escHtml(e.podcast_title||'')}</span>
            <span>${fmtDate(e.pub_date)}</span>
            ${statusBadge(e.status)}
          </div>
        </div>
        <div class="episode-actions">
          <button class="btn btn-ghost btn-icon btn-sm" title="Aus Leseliste entfernen" onclick="event.stopPropagation();toggleWatch(${e.id}, this)">${icon('bookmark-check')}</button>
        </div>
      </div>`).join('');
  } catch {}
}

async function addPodcast() {
  const url = document.getElementById('rss-url').value.trim();
  if (!url) return toast('Bitte eine URL eingeben', 'error');
  const autoT = document.getElementById('auto-transcribe').checked;
  const fullText = document.getElementById('full-text').checked;
  const maxEps = parseInt(document.getElementById('max-eps').value)||0;
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Lädt…';
  try {
    const r = await API.post('/api/podcasts', { rss_url: url, auto_transcribe: autoT, max_episodes: maxEps, full_text_extraction: fullText });
    toast(`✅ "${r.title}" abonniert (${r.episode_count} Folgen)`, 'success');
    document.getElementById('rss-url').value = '';
    document.getElementById('add-section').style.display = 'none';
    await loadPodcasts();
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Abonnieren';
  }
}

async function importOpml() {
  const file = document.getElementById('opml-file').files[0];
  if (!file) return toast('Bitte eine OPML-Datei wählen', 'error');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/api/podcasts/opml', { method:'POST', body: fd });
    const data = await r.json();
    toast(`${data.found} RSS-URLs gefunden. Bitte einzeln abonnieren.`, 'info');
    // Show URLs
    document.getElementById('rss-url').value = data.urls[0]||'';
  } catch(e) { toast(e.message, 'error'); }
}

async function directTranscribe() {
  const raw = document.getElementById('direct-urls').value.trim();
  if (!raw) return toast('Bitte URLs eingeben', 'error');
  const urls = raw.split('\n').map(u=>u.trim()).filter(Boolean);
  try {
    const r = await API.post('/api/episodes/transcribe', { urls });
    toast(`✅ ${r.queued} URL(s) in die Warteschlange gestellt`, 'success');
    document.getElementById('direct-urls').value = '';
  } catch(e) { toast(e.message, 'error'); }
}

async function toggleWatch(id, btn) {
  await API.patch(`/api/episodes/${id}/watchlist`);
  await loadWatchlist();
}

function podcastImgFallback(img) {
  img.parentNode.innerHTML = `<div class="podcast-card-placeholder">${icon('headphones',{size:40})}</div>`;
}

// Open add panel when arriving via ➕ Abonnieren (/?add=1)
if (new URLSearchParams(location.search).get('add') === '1') {
  toggleAddPanel();
  history.replaceState(null, '', '/');
}

// Init
loadPodcasts();
loadWatchlist();
setInterval(() => { loadPodcasts(); }, 10000);
</script>
</body>
</html>
