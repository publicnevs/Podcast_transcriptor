<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodScribe — Entdecken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7c6ff7">
</head>
<body>
<div id="nav-mount"></div>
<div class="main-content">

  <div class="page-header" style="display:block;margin-bottom:1.5rem">
    <h1 style="font-size:1.6rem;font-weight:700">✨ Entdecken</h1>
    <p style="color:var(--text-muted);margin-top:.375rem;font-size:.9rem">Empfohlene Podcasts — kuratierte Auswahl für direkten Start</p>
  </div>

  <div id="rec-list" class="episode-list">
    <div class="empty-state"><div class="spinner"></div></div>
  </div>

</div>

<footer class="app-footer"><strong>PodScribe</strong> · © 2026 Sven Kompe · <a href="/about">Features & Info</a></footer>
<div id="toast-container"></div>
<script src="/static/app.js"></script>
<script>
document.getElementById('nav-mount').innerHTML = renderNav('/discover');
initGlobalSearch();

async function load() {
  const list = document.getElementById('rec-list');
  try {
    const items = await API.get('/api/recommended');
    if (!items.length) {
      list.innerHTML = '<div class="empty-state"><p>Keine Empfehlungen verfügbar.</p></div>';
      return;
    }
    list.innerHTML = items.map(renderRec).join('');
  } catch(e) {
    list.innerHTML = `<div class="empty-state" style="color:var(--error)">${escHtml(e.message)}</div>`;
  }
}

function renderRec(p) {
  const subscribed = p.subscribed;
  return `
    <div class="episode-item" style="align-items:flex-start;gap:1rem">
      <div style="flex:1;min-width:0">
        <div class="episode-title" style="display:flex;align-items:center;gap:.5rem">
          ${escHtml(p.title)}
          ${p.lang === 'en' ? '<span style="font-size:.7rem;color:var(--text-muted);border:1px solid var(--border);border-radius:4px;padding:.1rem .35rem">EN</span>' : ''}
          ${p.transcripts ? '<span style="font-size:.7rem;color:var(--success);border:1px solid var(--success);border-radius:4px;padding:.1rem .35rem" title="Feed liefert Transkripte – kein Audio-Download nötig">✓ Transkripte</span>' : ''}
        </div>
        <div class="episode-summary" style="margin-top:.375rem">${escHtml(p.desc)}</div>
      </div>
      <div style="flex-shrink:0">
        ${subscribed
          ? `<span class="badge" style="color:var(--success);border-color:var(--success)">✓ Abonniert</span>`
          : `<button class="btn btn-primary btn-sm" onclick="subscribe(this, ${JSON.stringify(p.rss)})">+ Abonnieren</button>`}
      </div>
    </div>`;
}

async function subscribe(btn, rss) {
  btn.disabled = true;
  btn.textContent = '⏳';
  try {
    await API.post('/api/podcasts', { rss_url: rss, auto_transcribe: false, max_episodes: 10 });
    toast('Abonniert!', 'success');
    btn.closest('.episode-item').querySelector('div:last-child').innerHTML =
      '<span class="badge" style="color:var(--success);border-color:var(--success)">✓ Abonniert</span>';
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false;
    btn.textContent = '+ Abonnieren';
  }
}

load();
</script>
</body>
</html>
